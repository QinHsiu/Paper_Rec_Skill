[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "wiki-bridge"
version = "0.5.0"
description = "Bridge Paper_Rec structured reports into self-hosted Wiki Markdown pages"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
wiki-bridge = "wiki_bridge.cli:main"

[tool.setuptools.packages.find]
include = ["wiki_bridge*"]

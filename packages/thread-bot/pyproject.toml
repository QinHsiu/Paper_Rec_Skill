[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "paper-rec-thread-bot"
version = "0.1.0"
description = "Multi-channel Cognitive Thread bot (Feishu/Telegram/WeCom/QQ OneBot)"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.110",
  "uvicorn[standard]>=0.27",
]

[project.scripts]
paper-rec-bot = "thread_bot.__main__:main"

[tool.setuptools.packages.find]
include = ["thread_bot*"]
